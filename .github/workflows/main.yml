name: CI - Build and Test (BarberShop)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore dependencies
        run: dotnet restore BarberShop.sln

      - name: Build solution
        run: dotnet build BarberShop.sln --no-restore --configuration Release

      - name: Run tests (if exists)
        run: dotnet test BarberShop.sln --no-build --configuration Release --verbosity normal || echo "No tests found"
